---
apiVersion: v1
kind: Service
metadata:
  name: vortexflow-api
  namespace: vortexflow
  labels:
    app: vortexflow-api
spec:
  selector:
    app: vortexflow-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vortexflow-api
  namespace: vortexflow
  labels:
    app: vortexflow-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: vortexflow-api
  template:
    metadata:
      labels:
        app: vortexflow-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: api
          image: ghcr.io/tu-organizacion/vortexflow-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: vortexflow-api-config
            - secretRef:
                name: vortexflow-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vortexflow-worker
  namespace: vortexflow
  labels:
    app: vortexflow-worker
spec:
  selector:
    app: vortexflow-worker
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vortexflow-worker
  namespace: vortexflow
  labels:
    app: vortexflow-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vortexflow-worker
  template:
    metadata:
      labels:
        app: vortexflow-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: worker
          image: ghcr.io/tu-organizacion/vortexflow-worker:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: vortexflow-worker-config
            - secretRef:
                name: vortexflow-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vortexflow-frontend
  namespace: vortexflow
  labels:
    app: vortexflow-frontend
spec:
  selector:
    app: vortexflow-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vortexflow-frontend
  namespace: vortexflow
  labels:
    app: vortexflow-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vortexflow-frontend
  template:
    metadata:
      labels:
        app: vortexflow-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/tu-organizacion/vortexflow-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: vortexflow-frontend-config
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
